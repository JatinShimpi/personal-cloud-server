spring:
  application:
    name: personal-cloud-server

  # Default profile: H2 for local development
  datasource:
    url: jdbc:h2:file:./data/clouddb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10GB
      max-request-size: 10GB

# App-specific configuration
app:
  jwt:
    secret: Y2xvdWRzZXJ2ZXItand0LXNlY3JldC1rZXktdGhhdC1pcy1sb25nLWVub3VnaC1mb3ItaHMyNTY=
    expiration-ms: 86400000  # 24 hours
  file:
    upload-dir: ./data/uploads

server:
  port: 8080

---
# Production profile (PostgreSQL via Docker)
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:clouddb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:clouduser}
    password: ${DB_PASSWORD:cloudpass}

  h2:
    console:
      enabled: false

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      data-locations: classpath:data-prod.sql
      continue-on-error: true

app:
  jwt:
    secret: ${JWT_SECRET:Y2xvdWRzZXJ2ZXItand0LXNlY3JldC1rZXktdGhhdC1pcy1sb25nLWVub3VnaC1mb3ItaHMyNTY=}
  file:
    upload-dir: /data/uploads
